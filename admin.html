<script src="supabase.js"></script>
<script>
  async function loadAdminProducts() {
    const container = document.getElementById('admin-products');
    container.innerHTML = '<p class="text-gray-400">Loading products...</p>';

    try {
      const { data, error } = await window.supabaseClient
        .from('products')
        .select('*')
        .order('id');

      if (error) throw error;

      if (!data || data.length === 0) {
        container.innerHTML = '<p class="text-gray-400">No products yet. Add one above.</p>';
        return;
      }

      container.innerHTML = data.map(p => `
        <div class="bg-zinc-900 rounded-3xl p-6 flex gap-6">
          <img src="${p.img}" class="w-24 h-24 object-cover rounded-2xl" onerror="this.src='https://via.placeholder.com/100'">
          <div class="flex-1">
            <h3 class="font-semibold">${p.name}</h3>
            <p class="text-yellow-400">$${p.price}</p>
          </div>
          <button onclick="deleteProduct(${p.id})" class="text-red-500 hover:text-red-400 px-4">Delete</button>
        </div>
      `).join('');
    } catch (err) {
      console.error(err);
      container.innerHTML = `<p class="text-red-400">Error loading products: ${err.message}</p>`;
    }
  }

  async function addProduct() {
    const name = document.getElementById('name').value.trim();
    const price = parseFloat(document.getElementById('price').value);
    const img = document.getElementById('img').value.trim();

    if (!name || !price || !img) {
      alert("Please fill all fields");
      return;
    }

    const { error } = await window.supabaseClient.from('products').insert({ name, price, img });

    if (error) {
      alert("Error: " + error.message);
    } else {
      alert("✅ Product added!");
      document.getElementById('name').value = '';
      document.getElementById('price').value = '';
      document.getElementById('img').value = '';
      loadAdminProducts();
    }
  }

  async function deleteProduct(id) {
    if (!confirm("Delete this product?")) return;
    const { error } = await window.supabaseClient.from('products').delete().eq('id', id);
    if (error) alert("Delete failed");
    else loadAdminProducts();
  }

  window.onload = loadAdminProducts;
</script>

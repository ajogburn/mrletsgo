<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Mr. LetsGo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-black text-white p-8">

  <div class="max-w-5xl mx-auto">
    <div class="flex items-center justify-between mb-8">
      <h1 class="text-5xl font-black">Admin Dashboard</h1>
      <a href="index.html" class="text-sm text-gray-400 hover:text-white">← Back to site</a>
    </div>

    <!-- LOGIN SECTION -->
    <div id="login-section" class="max-w-md mx-auto">
      <div class="bg-zinc-900 rounded-3xl p-8">
        <h2 class="text-2xl font-bold mb-6">Sign in to manage products</h2>

        <div id="login-error" class="hidden mb-4 text-red-400 text-sm"></div>

        <input id="login-email" type="email" placeholder="Email" 
               class="w-full bg-zinc-800 p-4 rounded-2xl mb-3">
        <input id="login-password" type="password" placeholder="Password" 
               class="w-full bg-zinc-800 p-4 rounded-2xl mb-6">

        <button id="login-btn"
                class="bg-yellow-400 text-black font-bold py-4 w-full rounded-2xl hover:bg-white mb-3">
          Sign In
        </button>

        <button id="signup-btn"
                class="w-full text-sm text-gray-400 hover:text-white py-2">
          Create account (first time setup)
        </button>
      </div>
      <p class="text-center text-xs text-gray-500 mt-4">Only authorized accounts can manage the store.</p>
    </div>

    <!-- MANAGEMENT SECTION (hidden until logged in) -->
    <div id="management-section" class="hidden">
      <div class="flex items-center justify-between mb-6">
        <div>
          <span class="text-gray-400 text-sm">Logged in as</span>
          <span id="current-user" class="font-medium ml-2"></span>
        </div>
        <button id="logout-btn"
                class="text-sm px-4 py-2 rounded-xl border border-zinc-700 hover:bg-zinc-900">Log out</button>
      </div>

      <!-- Add / Edit Product -->
      <div class="bg-zinc-900 rounded-3xl p-8 mb-8">
        <h2 id="form-title" class="text-2xl font-bold mb-6">Add New Product</h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input id="name" placeholder="Product Name" class="bg-zinc-800 p-4 rounded-2xl">
          <input id="price" type="number" step="0.01" placeholder="Price (e.g. 220)" class="bg-zinc-800 p-4 rounded-2xl">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
          <input id="brand" placeholder="Brand (e.g. Jordan, Nike, New Balance)" class="bg-zinc-800 p-4 rounded-2xl">
          <div class="flex items-center gap-6 bg-zinc-800 rounded-2xl px-4">
            <label class="flex items-center gap-2 text-sm cursor-pointer">
              <input id="is_featured" type="checkbox" class="w-4 h-4 accent-yellow-400"> 
              <span>Featured Sneakers</span>
            </label>
            <label class="flex items-center gap-2 text-sm cursor-pointer">
              <input id="is_new_drop" type="checkbox" class="w-4 h-4 accent-yellow-400"> 
              <span>New Drop</span>
            </label>
          </div>
        </div>

        <!-- Primary / Cover Image -->
        <div class="mt-4">
          <label class="block text-xs uppercase tracking-widest text-gray-400 mb-1.5">Cover Image (main)</label>
          <input id="img" placeholder="https://... (main product photo)" class="w-full bg-zinc-800 p-4 rounded-2xl">
        </div>

        <!-- Additional Images -->
        <div class="mt-4">
          <label class="block text-xs uppercase tracking-widest text-gray-400 mb-1.5">Additional Images</label>
          <div id="extra-images-container" class="space-y-2"></div>
          <button type="button" id="add-image-btn"
                  class="mt-2 text-sm px-3 py-1.5 rounded-xl border border-zinc-700 hover:bg-zinc-800 flex items-center gap-2">
            <i class="fa-solid fa-plus"></i> <span>Add another image URL</span>
          </button>
        </div>

        <div class="flex gap-3 mt-6">
          <button id="submit-btn"
                  class="flex-1 bg-yellow-400 text-black font-bold py-4 rounded-2xl hover:bg-white">
            Add Product
          </button>
          <button id="cancel-edit-btn"
                  class="hidden px-6 py-4 rounded-2xl border border-zinc-700 hover:bg-zinc-800">
            Cancel Edit
          </button>
        </div>
      </div>

      <!-- Current Products -->
      <div class="bg-zinc-900 rounded-3xl p-8">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-2xl font-bold">Current Products</h2>
          <button id="refresh-btn"
                  class="text-sm px-4 py-2 rounded-xl border border-zinc-700 hover:bg-zinc-800">Refresh</button>
        </div>

        <div id="products-list">
          <p class="text-gray-400">Loading products...</p>
        </div>
      </div>

      <div id="admin-message" class="mt-6 text-center text-sm"></div>
    </div>
  </div>

  <script src="supabase.js"></script>
  <script>
    const client = window.supabaseClient;

    let editingId = null;
    let extraImageInputs = []; // track extra image input elements

    // --- Extra images (multi-image) helpers ---
    function addExtraImageInput(value = '') {
      const container = document.getElementById('extra-images-container');
      const wrapper = document.createElement('div');
      wrapper.className = 'flex gap-2';

      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = 'https://... additional image';
      input.className = 'flex-1 bg-zinc-800 p-3 rounded-2xl text-sm';
      input.value = value || '';

      const removeBtn = document.createElement('button');
      removeBtn.type = 'button';
      removeBtn.className = 'px-3 text-red-400 hover:text-red-500 border border-zinc-700 rounded-2xl';
      removeBtn.innerHTML = '<i class="fa-solid fa-times"></i>';
      removeBtn.onclick = () => {
        wrapper.remove();
        extraImageInputs = extraImageInputs.filter(el => el !== input);
      };

      wrapper.appendChild(input);
      wrapper.appendChild(removeBtn);
      container.appendChild(wrapper);

      extraImageInputs.push(input);
      return input;
    }

    function clearExtraImages() {
      const container = document.getElementById('extra-images-container');
      container.innerHTML = '';
      extraImageInputs = [];
    }

    function getExtraImages() {
      return extraImageInputs
        .map(el => (el.value || '').trim())
        .filter(Boolean);
    }

    function setExtraImages(urls) {
      clearExtraImages();
      (urls || []).forEach(u => addExtraImageInput(u));
    }

    // ---------- AUTH ----------
    async function checkAuth() {
      const { data: { user } } = await client.auth.getUser();
      if (user) {
        showManagementUI(user);
      } else {
        showLoginUI();
      }
    }

    function showLoginUI() {
      document.getElementById('login-section').classList.remove('hidden');
      document.getElementById('management-section').classList.add('hidden');
    }

    function showManagementUI(user) {
      document.getElementById('login-section').classList.add('hidden');
      document.getElementById('management-section').classList.remove('hidden');
      document.getElementById('current-user').textContent = user.email;
      loadProductList();
    }

    async function handleLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errorEl = document.getElementById('login-error');

      errorEl.classList.add('hidden');
      if (!email || !password) {
        errorEl.textContent = 'Please enter email and password';
        errorEl.classList.remove('hidden');
        return;
      }

      const { data, error } = await client.auth.signInWithPassword({ email, password });
      if (error) {
        errorEl.textContent = error.message;
        errorEl.classList.remove('hidden');
        return;
      }
      showManagementUI(data.user);
    }

    async function handleSignUp() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errorEl = document.getElementById('login-error');

      errorEl.classList.add('hidden');
      if (!email || !password || password.length < 6) {
        errorEl.textContent = 'Enter a valid email and password (min 6 chars)';
        errorEl.classList.remove('hidden');
        return;
      }

      const { data, error } = await client.auth.signUp({ email, password });
      if (error) {
        errorEl.textContent = error.message;
        errorEl.classList.remove('hidden');
        return;
      }
      if (data.user) {
        // If email confirmation is OFF in Supabase, this will sign them in immediately
        document.getElementById('login-error').textContent = 'Account created. Signing in...';
        document.getElementById('login-error').classList.remove('hidden');
        document.getElementById('login-error').classList.add('text-green-400');
        setTimeout(() => {
          checkAuth();
        }, 800);
      } else {
        errorEl.textContent = 'Check your email for a confirmation link (or disable confirmations in Supabase Auth settings).';
        errorEl.classList.remove('hidden');
      }
    }

    async function handleLogout() {
      await client.auth.signOut();
      window.location.reload();
    }

    // ---------- PRODUCT MANAGEMENT ----------
    async function loadProductList() {
      const container = document.getElementById('products-list');
      container.innerHTML = '<p class="text-gray-400">Loading products...</p>';

      try {
        const { data, error } = await client
          .from('products')
          .select('*')
          .order('id', { ascending: false });

        if (error) throw error;

        if (!data || data.length === 0) {
          container.innerHTML = '<p class="text-gray-400">No products yet. Add your first one above.</p>';
          return;
        }

        // Group by brand for nicer admin view
        const grouped = {};
        data.forEach(p => {
          const b = p.brand || 'Other';
          if (!grouped[b]) grouped[b] = [];
          grouped[b].push(p);
        });

        let html = '';
        Object.keys(grouped).sort().forEach(brand => {
          html += `<div class="text-xs uppercase tracking-widest text-gray-400 mb-2 mt-4 first:mt-0">${brand}</div>`;
          grouped[brand].forEach(p => {
            const extraCount = (Array.isArray(p.images) ? p.images.length : 0);
            const badges = [];
            if (p.is_featured) badges.push('<span class="text-[10px] px-2 py-0.5 rounded bg-yellow-400 text-black font-semibold">FEATURED</span>');
            if (p.is_new_drop) badges.push('<span class="text-[10px] px-2 py-0.5 rounded bg-emerald-500 text-black font-semibold">NEW DROP</span>');
            const imgCountBadge = extraCount > 0 ? `<span class="text-[10px] px-1.5 py-0.5 rounded bg-zinc-700">${extraCount + 1} photos</span>` : '';

            html += `
              <div class="flex gap-4 bg-zinc-950 rounded-2xl p-4 mb-3 items-center">
                <img src="${p.img}" class="w-16 h-16 object-cover rounded-xl flex-shrink-0" 
                     onerror="this.src='https://via.placeholder.com/64x64/27272a/fff?text=No+Img'">
                <div class="flex-1 min-w-0">
                  <div class="font-semibold truncate">${p.name}</div>
                  <div class="flex items-center gap-2 mt-0.5">
                    <span class="text-yellow-400">$${p.price}</span>
                    ${imgCountBadge}
                    ${badges.join('')}
                  </div>
                  <div class="text-xs text-gray-500">ID: ${p.id}${p.brand ? ' • ' + p.brand : ''}</div>
                </div>
                <div class="flex gap-2 flex-shrink-0">
                  <button onclick="startEditFromProduct(${p.id})"
                          class="px-4 py-2 text-sm rounded-xl border border-zinc-700 hover:bg-zinc-800">Edit</button>
                  <button onclick="deleteProduct(${p.id})"
                          class="px-4 py-2 text-sm rounded-xl border border-red-900 text-red-400 hover:bg-red-950">Delete</button>
                </div>
              </div>
            `;
          });
        });

        container.innerHTML = html || '<p class="text-gray-400">No products yet.</p>';
      } catch (err) {
        console.error(err);
        container.innerHTML = `<p class="text-red-400">Failed to load products: ${err.message}</p>`;
      }
    }

    function escapeForAttr(str) {
      if (!str) return '';
      return String(str).replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    // New: startEdit that fetches full product (handles new columns + images)
    async function startEditFromProduct(id) {
      try {
        const { data: p, error } = await client.from('products').select('*').eq('id', id).single();
        if (error || !p) throw error || new Error('Not found');

        editingId = p.id;
        document.getElementById('name').value = p.name || '';
        document.getElementById('price').value = p.price || '';
        document.getElementById('brand').value = p.brand || '';
        document.getElementById('img').value = p.img || '';
        document.getElementById('is_featured').checked = !!p.is_featured;
        document.getElementById('is_new_drop').checked = !!p.is_new_drop;

        // extra images
        let extras = [];
        if (Array.isArray(p.images)) extras = p.images;
        else if (typeof p.images === 'string') { try { extras = JSON.parse(p.images) || []; } catch (_) {} }
        setExtraImages(extras);

        document.getElementById('form-title').textContent = 'Edit Product';
        document.getElementById('submit-btn').textContent = 'Update Product';
        document.getElementById('cancel-edit-btn').classList.remove('hidden');

        document.getElementById('name').scrollIntoView({ behavior: 'smooth', block: 'center' });
      } catch (e) {
        alert('Failed to load product for editing: ' + e.message);
      }
    }

    // Back-compat in case old calls exist somewhere
    window.startEdit = startEditFromProduct;

    function cancelEdit() {
      editingId = null;
      document.getElementById('name').value = '';
      document.getElementById('price').value = '';
      document.getElementById('brand').value = '';
      document.getElementById('img').value = '';
      document.getElementById('is_featured').checked = false;
      document.getElementById('is_new_drop').checked = false;
      clearExtraImages();

      document.getElementById('form-title').textContent = 'Add New Product';
      document.getElementById('submit-btn').textContent = 'Add Product';
      document.getElementById('cancel-edit-btn').classList.add('hidden');
    }

    async function submitProduct() {
      const name = document.getElementById('name').value.trim();
      const price = parseFloat(document.getElementById('price').value);
      const brand = document.getElementById('brand').value.trim() || null;
      const img = document.getElementById('img').value.trim();
      const is_featured = document.getElementById('is_featured').checked;
      const is_new_drop = document.getElementById('is_new_drop').checked;
      const msg = document.getElementById('admin-message');

      const extraImages = getExtraImages();

      if (!name || !price || !img) {
        msg.innerHTML = '<span class="text-red-400">Name, Price and Cover Image (img) are required.</span>';
        return;
      }

      msg.innerHTML = '<span class="text-gray-400">Saving...</span>';

      const payload = {
        name,
        price,
        brand,
        img,
        is_featured,
        is_new_drop,
        images: extraImages.length ? extraImages : []
      };

      try {
        let error;
        if (editingId) {
          ({ error } = await client
            .from('products')
            .update(payload)
            .eq('id', editingId));
        } else {
          ({ error } = await client
            .from('products')
            .insert(payload));
        }

        if (error) throw error;

        msg.innerHTML = `<span class="text-green-400">✅ ${editingId ? 'Updated' : 'Added'} successfully!</span>`;
        cancelEdit();
        await loadProductList();

        // refresh global cache used by shop/home
        if (window.loadProductsFromSupabase) await window.loadProductsFromSupabase();

        setTimeout(() => { msg.innerHTML = ''; }, 2500);
      } catch (err) {
        console.error(err);
        msg.innerHTML = `<span class="text-red-400">Error: ${err.message}</span>`;
      }
    }

    async function deleteProduct(id) {
      if (!confirm('Delete this product? This cannot be undone.')) return;

      const msg = document.getElementById('admin-message');
      msg.innerHTML = '<span class="text-gray-400">Deleting...</span>';

      try {
        const { error } = await client.from('products').delete().eq('id', id);
        if (error) throw error;

        msg.innerHTML = '<span class="text-green-400">Deleted.</span>';
        await loadProductList();
        if (window.loadProductsFromSupabase) window.loadProductsFromSupabase();
        setTimeout(() => { msg.innerHTML = ''; }, 2000);
      } catch (err) {
        msg.innerHTML = `<span class="text-red-400">Delete failed: ${err.message}</span>`;
      }
    }

    // ---------- INIT ----------
    function initAdmin() {
      // Login handlers
      document.getElementById('login-btn').addEventListener('click', handleLogin);
      document.getElementById('signup-btn').addEventListener('click', handleSignUp);

      // Allow enter key in login
      ['login-email', 'login-password'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') handleLogin();
        });
      });

      // Management handlers
      document.getElementById('logout-btn').addEventListener('click', handleLogout);
      document.getElementById('submit-btn').addEventListener('click', submitProduct);
      document.getElementById('cancel-edit-btn').addEventListener('click', cancelEdit);
      document.getElementById('refresh-btn').addEventListener('click', loadProductList);
      document.getElementById('add-image-btn').addEventListener('click', () => addExtraImageInput());

      // Check current auth state
      checkAuth();

      // Optional: react to auth changes
      client.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_OUT') {
          showLoginUI();
        }
      });
    }

    window.onload = initAdmin;
  </script>
</body>
</html>

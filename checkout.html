<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Mr. LetsGo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="supabase.js"></script>
  <script src="main.js"></script>
</head>
<body class="bg-black text-white">

  <div id="header-placeholder"></div>

  <div class="max-w-7xl mx-auto px-6 py-12">
    <h1 class="text-5xl font-black mb-10">Checkout</h1>
    
    <div class="grid lg:grid-cols-5 gap-12">
      <!-- Left Side - Shipping -->
      <div class="lg:col-span-3">
        <h2 class="text-2xl font-bold mb-6">Shipping Details</h2>
        <div class="space-y-6">
          <div class="grid grid-cols-2 gap-4">
            <input type="text" placeholder="First Name" class="bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
            <input type="text" placeholder="Last Name" class="bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
          </div>
          <input type="email" placeholder="Email Address" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
          <input type="text" placeholder="Street Address" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
          <div class="grid grid-cols-3 gap-4">
            <input type="text" placeholder="City" class="bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
            <input type="text" placeholder="State" class="bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
            <input type="text" placeholder="ZIP" class="bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
          </div>
        </div>
      </div>

      <!-- Right Side - Order Summary -->
      <div class="lg:col-span-2">
        <h2 class="text-2xl font-bold mb-6">Order Summary</h2>
        <div id="order-summary" class="bg-zinc-900 rounded-3xl p-6 mb-8"></div>

        <div class="bg-zinc-900 rounded-3xl p-6">
          <div class="flex justify-between mb-2">
            <span>Subtotal</span>
            <span id="subtotal">$513</span>
          </div>
          <div class="flex justify-between mb-6">
            <span>Shipping</span>
            <span class="text-green-400">FREE</span>
          </div>
          <hr class="border-zinc-700">
          <div class="flex justify-between text-xl font-bold mt-4">
            <span>Total</span>
            <span id="total" class="text-yellow-400">$513</span>
          </div>
        </div>

        <button onclick="completeOrder()" 
          class="mt-8 w-full bg-yellow-400 hover:bg-white text-black py-6 rounded-2xl font-bold text-xl transition">
          PLACE ORDER
        </button>
        <p id="checkout-status" class="text-center text-sm mt-3 text-gray-400"></p>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script>
    initCommonUI();

    function renderOrderSummary() {
      const summaryEl = document.getElementById('order-summary');
      const subtotalEl = document.getElementById('subtotal');
      const totalEl = document.getElementById('total');
      if (!summaryEl || !subtotalEl || !totalEl) return;

      const cart = getCart();
      if (cart.length === 0) {
        summaryEl.innerHTML = `<p class="text-gray-400">Your cart is empty. <a href="shop.html" class="text-yellow-400 hover:underline">Go shopping</a></p>`;
        subtotalEl.textContent = '$0';
        totalEl.textContent = '$0';
        return;
      }

      let html = '';
      let subtotal = 0;

      cart.forEach(item => {
        const lineTotal = item.price * (item.quantity || 1);
        subtotal += lineTotal;
        const sizeLabel = item.size ? ` (US ${item.size})` : '';
        html += `
          <div class="flex justify-between py-1.5 text-sm">
            <span class="truncate pr-2">${item.name}${sizeLabel} ×${item.quantity || 1}</span>
            <span class="whitespace-nowrap">$${lineTotal}</span>
          </div>
        `;
      });

      summaryEl.innerHTML = html;
      subtotalEl.textContent = '$' + subtotal;
      totalEl.textContent = '$' + subtotal;
    }

    async function completeOrder() {
      const statusEl = document.getElementById('checkout-status');
      const cart = getCart();

      if (cart.length === 0) {
        alert("Your cart is empty.");
        return;
      }

      const total = getCartTotal();

      // Collect shipping data from the form (best effort)
      const shipping = {
        firstName: document.querySelector('input[placeholder="First Name"]')?.value || '',
        lastName: document.querySelector('input[placeholder="Last Name"]')?.value || '',
        email: document.querySelector('input[placeholder="Email Address"]')?.value || '',
        address: document.querySelector('input[placeholder="Street Address"]')?.value || '',
        city: document.querySelector('input[placeholder="City"]')?.value || '',
        state: document.querySelector('input[placeholder="State"]')?.value || '',
        zip: document.querySelector('input[placeholder="ZIP"]')?.value || ''
      };

      statusEl.textContent = 'Processing order...';
      statusEl.className = 'text-center text-sm mt-3 text-gray-400';

      try {
        // Try to save a real order if the user is logged in
        const user = await (window.getCurrentUser ? window.getCurrentUser() : Promise.resolve(null));

        if (user && window.createOrder) {
          const savedOrder = await window.createOrder({
            items: cart,
            total: total,
            shipping: shipping
          });

          clearCart();
          renderOrderSummary();
          setTimeout(updateCartCount, 50);

          statusEl.innerHTML = `✅ Order #${savedOrder.id} placed successfully for $${total}.<br>
            <span class="text-xs">You can view it in <a href="account.html" class="text-yellow-400 underline">My Account</a>.</span>`;
          statusEl.className = 'text-center text-sm mt-3 text-green-400';

          // Disable the button
          const btns = document.querySelectorAll('button');
          btns.forEach(b => { if (b.textContent.includes('PLACE ORDER')) b.disabled = true; });
        } else {
          // Not logged in — fall back to old demo behavior
          alert(`✅ Thank you! Order placed for $${total} (Demo mode — log in at checkout for real order tracking)`);
          clearCart();
          renderOrderSummary();
          setTimeout(updateCartCount, 50);
          statusEl.textContent = 'Order placed in demo mode. Log in next time to save orders to your account.';
        }
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'Failed to save order: ' + err.message;
        statusEl.className = 'text-center text-sm mt-3 text-red-400';
      }
    }

    window.onload = () => {
      renderOrderSummary();
      initCommonUI();
    };
  </script>
</body>
</html>

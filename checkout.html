<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Mr. LetsGo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="product.js"></script>
  <script src="main.js"></script>
</head>
<body class="bg-black text-white">

  <div id="header-placeholder"></div>

  <div class="max-w-7xl mx-auto px-6 py-12">
    <h1 class="text-5xl font-black mb-10">Checkout</h1>
    
    <div class="grid lg:grid-cols-5 gap-12">
      <!-- Left Side - Shipping -->
      <div class="lg:col-span-3">
        <h2 class="text-2xl font-bold mb-6">Shipping Details</h2>
        <div class="space-y-6">
          <div class="grid grid-cols-2 gap-4">
            <input type="text" placeholder="First Name" class="bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
            <input type="text" placeholder="Last Name" class="bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
          </div>
          <input type="email" placeholder="Email Address" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
          <input type="text" placeholder="Street Address" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
          <div class="grid grid-cols-3 gap-4">
            <input type="text" placeholder="City" class="bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
            <input type="text" placeholder="State" class="bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
            <input type="text" placeholder="ZIP" class="bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
          </div>
        </div>
      </div>

      <!-- Right Side - Order Summary -->
      <div class="lg:col-span-2">
        <h2 class="text-2xl font-bold mb-6">Order Summary</h2>
        <div id="order-summary" class="bg-zinc-900 rounded-3xl p-6 mb-8"></div>

        <div class="bg-zinc-900 rounded-3xl p-6">
          <div class="flex justify-between mb-2">
            <span>Subtotal</span>
            <span id="subtotal">$513</span>
          </div>
          <div class="flex justify-between mb-6">
            <span>Shipping</span>
            <span class="text-green-400">FREE</span>
          </div>
          <hr class="border-zinc-700">
          <div class="flex justify-between text-xl font-bold mt-4">
            <span>Total</span>
            <span id="total" class="text-yellow-400">$513</span>
          </div>
        </div>

        <button onclick="completeOrder()" 
          class="mt-8 w-full bg-yellow-400 hover:bg-white text-black py-6 rounded-2xl font-bold text-xl transition">
          PLACE ORDER
        </button>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script>
    initCommonUI();

    function renderOrderSummary() {
      const summaryEl = document.getElementById('order-summary');
      const subtotalEl = document.getElementById('subtotal');
      const totalEl = document.getElementById('total');
      if (!summaryEl || !subtotalEl || !totalEl) return;

      const cart = getCart();
      if (cart.length === 0) {
        summaryEl.innerHTML = `<p class="text-gray-400">Your cart is empty. <a href="shop.html" class="text-yellow-400 hover:underline">Go shopping</a></p>`;
        subtotalEl.textContent = '$0';
        totalEl.textContent = '$0';
        return;
      }

      let html = '';
      let subtotal = 0;

      cart.forEach(item => {
        const lineTotal = item.price * (item.quantity || 1);
        subtotal += lineTotal;
        const sizeLabel = item.size ? ` (US ${item.size})` : '';
        html += `
          <div class="flex justify-between py-1.5 text-sm">
            <span class="truncate pr-2">${item.name}${sizeLabel} ×${item.quantity || 1}</span>
            <span class="whitespace-nowrap">$${lineTotal}</span>
          </div>
        `;
      });

      summaryEl.innerHTML = html;
      subtotalEl.textContent = '$' + subtotal;
      totalEl.textContent = '$' + subtotal;
    }

    function completeOrder() {
      const cart = getCart();
      if (cart.length === 0) {
        alert("Your cart is empty.");
        return;
      }
      const total = getCartTotal();
      // Demo: "place order"
      alert(`✅ Thank you! Order placed for $${total} (Demo mode — cart cleared)`);
      clearCart();
      // Refresh the summary
      renderOrderSummary();
      // Badge will update on next navigation or we can force
      setTimeout(updateCartCount, 50);
    }

    window.onload = () => {
      renderOrderSummary();
    };
  </script>
  <script src="supabase.js"></script>
<script src="main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | Mr. LetsGo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-black text-white">

  <div id="header-placeholder"></div>

  <div class="max-w-4xl mx-auto px-6 py-16">
    <h1 class="text-5xl font-black mb-10">Your Cart</h1>
    <div id="cart-items" class="space-y-8"></div>

    <div class="mt-12 border-t border-zinc-800 pt-8">
      <div class="flex justify-between text-2xl font-bold">
        <span>Total</span>
        <span id="total" class="text-yellow-400">$528</span>
      </div>
      <a href="checkout.html" class="block mt-8 text-center bg-yellow-400 text-black py-6 text-xl font-bold rounded-2xl hover:bg-white">
        PROCEED TO CHECKOUT
      </a>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script>
    fetch('header.html').then(res => res.text()).then(data => document.getElementById('header-placeholder').innerHTML = data);
    fetch('footer.html').then(res => res.text()).then(data => document.getElementById('footer-placeholder').innerHTML = data);

    document.addEventListener('click', (e) => {
      if (e.target.closest('#mobile-menu-btn')) {
        const menu = document.getElementById('mobile-menu');
        const btn = document.getElementById('mobile-menu-btn');
        menu.classList.toggle('hidden');
        btn.innerHTML = menu.classList.contains('hidden') ? '<i class="fa-solid fa-bars"></i>' : '<i class="fa-solid fa-xmark"></i>';
      }
    });
  </script>
</body>
</html>

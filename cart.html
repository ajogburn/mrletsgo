<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | Mr. LetsGo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-black text-white">

  <!-- HEADER -->
  <header class="bg-black border-b border-zinc-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-8 flex items-center justify-between">
      <h1 class="text-3xl font-black tracking-tighter text-yellow-400">MR. LETSGO</h1>
      
      <nav class="hidden md:flex space-x-8 text-sm font-medium">
        <a href="shop.html" class="hover:text-yellow-400 transition">SHOP</a>
        <a href="#" class="hover:text-yellow-400 transition">NEW DROPS</a>
        <a href="#" class="hover:text-yellow-400 transition">BRANDS</a>
        <a href="about.html" class="hover:text-yellow-400 transition">ABOUT</a>
        <a href="#" class="hover:text-yellow-400 transition">CONTACT</a>
      </nav>

      <div class="flex items-center gap-5">
        <i class="fa-solid fa-magnifying-glass text-xl cursor-pointer hover:text-yellow-400"></i>
        <i class="fa-solid fa-user text-xl cursor-pointer hover:text-yellow-400"></i>
        <div class="relative cursor-pointer">
          <i class="fa-solid fa-bag-shopping text-xl hover:text-yellow-400"></i>
          <span class="absolute -top-1 -right-1 bg-yellow-400 text-black text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full">3</span>
        </div>
      </div>
    </div>
  </header>

  <div class="max-w-4xl mx-auto px-6 py-16">
    <h1 class="text-5xl font-black mb-10">Your Cart</h1>

    <div class="space-y-8" id="cart-items">
      <!-- JS will populate -->
    </div>

    <div class="mt-12 border-t border-zinc-800 pt-8">
      <div class="flex justify-between text-xl">
        <span class="font-medium">Subtotal</span>
        <span class="font-bold text-yellow-400" id="subtotal">$528</span>
      </div>
      <button onclick="checkout()" 
        class="mt-8 w-full bg-yellow-400 text-black py-6 text-lg font-bold rounded-2xl hover:bg-white transition">
        PROCEED TO CHECKOUT
      </button>
    </div>
  </div>

  <script>
    const cartItems = [
      { name: "Nike Air Force 1 '07", price: 129, qty: 1 },
      { name: "Jordan 1 Retro High", price: 189, qty: 1 },
      { name: "Adidas Samba OG", price: 95, qty: 2 }
    ];

    function renderCart() {
      const container = document.getElementById('cart-items');
      let html = '';
      let total = 0;

      cartItems.forEach((item, index) => {
        total += item.price * item.qty;
        html += `
          <div class="flex gap-6 bg-zinc-900 p-6 rounded-3xl">
            <div class="w-28 h-28 bg-zinc-800 rounded-2xl"></div>
            <div class="flex-1">
              <h3 class="font-semibold">${item.name}</h3>
              <p class="text-yellow-400">$${item.price}</p>
              <div class="flex items-center gap-4 mt-4">
                <button onclick="changeQty(${index}, -1)" class="w-8 h-8 border border-zinc-700 rounded-xl">-</button>
                <span>${item.qty}</span>
                <button onclick="changeQty(${index}, 1)" class="w-8 h-8 border border-zinc-700 rounded-xl">+</button>
              </div>
            </div>
            <div class="text-right">
              <p class="font-medium">$${(item.price * item.qty).toFixed(0)}</p>
              <button onclick="removeItem(${index})" class="text-red-500 text-sm mt-6">Remove</button>
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
      document.getElementById('subtotal').textContent = '$' + total;
    }

    function changeQty(index, change) {
      cartItems[index].qty += change;
      if (cartItems[index].qty < 1) cartItems[index].qty = 1;
      renderCart();
    }

    function removeItem(index) {
      cartItems.splice(index, 1);
      renderCart();
    }

    function checkout() {
      alert("Proceeding to checkout (Demo)");
    }

    window.onload = renderCart;
  </script>

</body>
</html>

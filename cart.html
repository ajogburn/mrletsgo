<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | Mr. LetsGo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="supabase.js"></script>
  <script src="main.js"></script>
</head>
<body class="bg-black text-white">

  <div id="header-placeholder"></div>

  <div class="max-w-4xl mx-auto px-6 py-16">
    <h1 class="text-5xl font-black mb-10">Your Cart</h1>
    <div id="cart-items" class="space-y-8"></div>

    <div class="mt-12 border-t border-zinc-800 pt-8">
      <div class="flex justify-between text-2xl font-bold">
        <span>Total</span>
        <span id="total" class="text-yellow-400">$528</span>
      </div>
      <a href="checkout.html" class="block mt-8 text-center bg-yellow-400 text-black py-6 text-xl font-bold rounded-2xl hover:bg-white">
        REVIEW &amp; SUBMIT ORDER
      </a>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script>
    initCommonUI();

    function renderCart() {
      const container = document.getElementById('cart-items');
      const totalEl = document.getElementById('total');
      if (!container || !totalEl) return;

      const cart = getCart();

      if (cart.length === 0) {
        container.innerHTML = `
          <div class="text-center py-16">
            <i class="fa-solid fa-bag-shopping text-6xl text-zinc-700 mb-6"></i>
            <p class="text-2xl text-gray-400 mb-2">Your cart is empty</p>
            <p class="text-gray-500 mb-8">Looks like you haven't added anything yet.</p>
            <a href="shop.html" class="inline-block bg-yellow-400 hover:bg-white text-black font-bold px-10 py-4 rounded-2xl transition">Browse the Shop</a>
          </div>
        `;
        totalEl.textContent = '$0';
        return;
      }

      container.innerHTML = cart.map((item, idx) => `
        <div class="flex flex-col sm:flex-row gap-6 bg-zinc-900 rounded-3xl p-5">
          <img src="${item.img}" 
               onerror="this.src='https://via.placeholder.com/160x160/27272a/fff?text=No+Image'" 
               class="w-32 h-32 sm:w-28 sm:h-28 object-cover rounded-2xl flex-shrink-0">

          <div class="flex-1 min-w-0">
            <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-2">
              <div class="min-w-0">
                <h3 class="font-semibold text-lg leading-tight">${item.name}</h3>
                <div class="text-sm text-gray-400 mt-1">Size: ${item.size || '—'}</div>
              </div>
              <div class="text-right whitespace-nowrap">
                <div class="font-medium">$${item.price}</div>
                <div class="text-xs text-gray-500">each</div>
              </div>
            </div>

            <div class="mt-5 flex items-center justify-between">
              <div class="inline-flex items-center border border-zinc-700 rounded-full overflow-hidden">
                <button onclick="changeCartQty(${item.id}, ${JSON.stringify(item.size)}, -1)" 
                        class="px-4 py-2 hover:bg-zinc-800 active:bg-zinc-700 transition">-</button>
                <span class="px-5 font-mono tabular-nums select-none">${item.quantity || 1}</span>
                <button onclick="changeCartQty(${item.id}, ${JSON.stringify(item.size)}, 1)" 
                        class="px-4 py-2 hover:bg-zinc-800 active:bg-zinc-700 transition">+</button>
              </div>

              <button onclick="removeCartItem(${item.id}, ${JSON.stringify(item.size)})" 
                      class="flex items-center gap-2 text-sm text-red-400 hover:text-red-500 transition">
                <i class="fa-solid fa-trash"></i>
                <span>Remove</span>
              </button>
            </div>
          </div>
        </div>
      `).join('');

      const total = getCartTotal();
      totalEl.textContent = '$' + total;
    }

    function changeCartQty(id, size, delta) {
      const cart = getCart();
      const item = cart.find(i => i.id === id && i.size === size);
      if (!item) return;
      const newQty = (item.quantity || 1) + delta;
      if (newQty < 1) {
        removeCartItem(id, size);
      } else {
        updateCartQuantity(id, size, newQty);
        renderCart();
      }
    }

    function removeCartItem(id, size) {
      removeFromCart(id, size);
      renderCart();
    }

    // Initial render + make sure badge is fresh
    window.onload = () => {
      renderCart();
      // belt & suspenders in case header loaded late
      setTimeout(updateCartCount, 150);
    };
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nike Air Force 1 '07 | Mr. LetsGo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-black text-white">

  <div id="header-placeholder"></div>

  <div class="max-w-7xl mx-auto px-6 py-12">
    <div class="grid md:grid-cols-2 gap-12">
      <div>
        <img id="main-image" src="https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa" class="w-full rounded-3xl">
      </div>
      <div>
        <h1 class="text-4xl font-black">Nike Air Force 1 '07</h1>
        <p class="text-yellow-400 text-3xl font-semibold mt-2">$129</p>

        <div class="mt-8">
          <h3 class="font-semibold mb-4">Size</h3>
          <div class="grid grid-cols-6 gap-3">
            <button class="size-btn border border-zinc-700 py-4 rounded-2xl hover:border-yellow-400">8</button>
            <button class="size-btn border border-zinc-700 py-4 rounded-2xl hover:border-yellow-400">9</button>
            <button class="size-btn border border-yellow-400 bg-zinc-900 py-4 rounded-2xl">10</button>
            <button class="size-btn border border-zinc-700 py-4 rounded-2xl hover:border-yellow-400">11</button>
            <button class="size-btn border border-zinc-700 py-4 rounded-2xl hover:border-yellow-400">12</button>
          </div>
        </div>

        <button onclick="addToCart()" class="mt-10 w-full bg-yellow-400 text-black py-6 font-bold text-xl rounded-2xl hover:bg-white">
          ADD TO CART
        </button>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script>
    fetch('header.html').then(res => res.text()).then(data => document.getElementById('header-placeholder').innerHTML = data);
    fetch('footer.html').then(res => res.text()).then(data => document.getElementById('footer-placeholder').innerHTML = data);

    document.addEventListener('click', (e) => {
      if (e.target.closest('#mobile-menu-btn')) {
        const menu = document.getElementById('mobile-menu');
        const btn = document.getElementById('mobile-menu-btn');
        menu.classList.toggle('hidden');
        btn.innerHTML = menu.classList.contains('hidden') ? '<i class="fa-solid fa-bars"></i>' : '<i class="fa-solid fa-xmark"></i>';
      }
    });

    function addToCart() {
      alert("Added to cart!");
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mr. LetsGo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-black text-white">

  <div id="header-placeholder"></div>

  <div class="max-w-7xl mx-auto px-6 py-12" id="product-content">
    <p class="text-center text-gray-400 py-20">Loading product...</p>
  </div>

  <div id="footer-placeholder"></div>

  <script src="supabase.js"></script>
  <script src="main.js"></script>
  <script>
    let currentProduct = null;
    let selectedSize = null;

    async function loadProduct() {
      const params = new URLSearchParams(window.location.search);
      const id = parseInt(params.get('id'));

      if (!id) {
        document.getElementById('product-content').innerHTML = `<p class="text-red-400">Product not found.</p>`;
        return;
      }

      try {
        // Load full list first — this populates window.products so addToCart() can find the item
        const allProducts = await loadProductsFromSupabase();

        const product = allProducts.find(p => p.id === id) || null;
        if (!product) {
          // fallback single fetch
          const { data, error } = await window.supabaseClient
            .from('products')
            .select('*')
            .eq('id', id)
            .single();
          if (error || !data) throw new Error("Product not found");
          currentProduct = data;
        } else {
          currentProduct = product;
        }

        renderProduct(currentProduct);
      } catch (err) {
        console.error(err);
        document.getElementById('product-content').innerHTML = `<p class="text-red-400">Failed to load product.</p>`;
      }
    }

    function renderProduct(data) {
      const images = (window.getProductImages ? window.getProductImages(data) : [data.img]).filter(Boolean);
      const mainImg = images[0] || data.img;

      const thumbs = images.length > 1 ? `
        <div class="flex gap-3 mt-3 overflow-x-auto pb-1">
          ${images.map((url, i) => `
            <img src="${url}" onclick="switchMainImage(this, '${url.replace(/'/g, "\\'")}')"
                 class="thumb-img w-16 h-16 object-cover rounded-2xl cursor-pointer border ${i===0 ? 'border-yellow-400' : 'border-transparent'} hover:border-zinc-600"
                 onerror="this.style.display='none'">
          `).join('')}
        </div>` : '';

      const brandLine = data.brand ? `<div class="text-sm text-gray-400 mt-1">${data.brand}</div>` : '';
      const badges = [];
      if (data.is_new_drop) badges.push('<span class="text-xs px-3 py-1 rounded-full bg-emerald-500 text-black font-semibold">NEW DROP</span>');
      if (data.is_featured) badges.push('<span class="text-xs px-3 py-1 rounded-full bg-yellow-400 text-black font-semibold">FEATURED</span>');

      document.getElementById('product-content').innerHTML = `
        <div class="grid md:grid-cols-2 gap-12">
          <!-- Images -->
          <div>
            <div class="relative">
              <img id="main-product-image" src="${mainImg}" class="w-full rounded-3xl" 
                   onerror="this.src='https://via.placeholder.com/600x600/27272a/ffffff?text=Image+Not+Found'">
              <!-- Favorite heart -->
              <button id="fav-heart-btn" 
                      class="absolute top-4 right-4 w-11 h-11 flex items-center justify-center rounded-full bg-black/70 hover:bg-black text-2xl transition">
                <i class="fa-solid fa-heart text-white/70"></i>
              </button>
            </div>
            ${thumbs}
          </div>

          <!-- Info -->
          <div>
            <div class="flex items-center gap-2 flex-wrap">
              <h1 class="text-4xl font-black">${data.name}</h1>
              ${badges.map(b => `<span>${b}</span>`).join('')}
            </div>
            ${brandLine}
            <p class="text-yellow-400 text-3xl font-semibold mt-3">$${data.price}</p>

            <div class="mt-10">
              <h3 class="font-semibold mb-4">Select Size (US)</h3>
              <div class="grid grid-cols-6 gap-3" id="size-grid">
                ${[7,8,9,10,11,12].map(size => `
                  <button onclick="selectSize(this, ${size})" 
                          class="size-btn border border-zinc-700 py-4 rounded-2xl hover:border-yellow-400 transition">${size}</button>
                `).join('')}
              </div>
            </div>

            <div class="flex gap-3 mt-12">
              <button onclick="handleAddToCart()" 
                class="flex-1 bg-yellow-400 text-black py-6 font-bold text-xl rounded-2xl hover:bg-white transition">
                ADD TO CART
              </button>
              <button id="fav-text-btn"
                class="px-6 py-6 rounded-2xl border border-zinc-700 hover:bg-zinc-900 text-sm font-semibold flex items-center gap-2">
                <i class="fa-solid fa-heart"></i> <span>FAVORITE</span>
              </button>
            </div>

            <div class="mt-8 text-xs text-gray-400">
              Free shipping on all orders • 30 day returns
            </div>
          </div>
        </div>
      `;

      // Wire favorite buttons after render
      setTimeout(() => wireFavoriteUI(data.id), 0);
    }

    function switchMainImage(thumbEl, url) {
      const main = document.getElementById('main-product-image');
      if (main) main.src = url;
      // highlight active thumb
      document.querySelectorAll('.thumb-img').forEach(t => t.classList.remove('border-yellow-400'));
      thumbEl.classList.add('border-yellow-400');
    }

    async function wireFavoriteUI(productId) {
      const heartBtn = document.getElementById('fav-heart-btn');
      const textBtn = document.getElementById('fav-text-btn');

      async function refreshHeart() {
        const fav = await window.isFavorited(productId);
        const icon = heartBtn ? heartBtn.querySelector('i') : null;
        if (icon) {
          if (fav) icon.classList.add('text-red-500');
          else icon.classList.remove('text-red-500');
        }
        if (textBtn) {
          textBtn.innerHTML = fav 
            ? '<i class="fa-solid fa-heart text-red-500"></i> <span>FAVORITED</span>'
            : '<i class="fa-solid fa-heart"></i> <span>FAVORITE</span>';
        }
      }

      await refreshHeart();

      const doToggle = async (e) => {
        if (e) { e.preventDefault(); e.stopPropagation(); }
        await window.toggleFavorite(productId);
        await refreshHeart();
      };

      if (heartBtn) heartBtn.addEventListener('click', doToggle);
      if (textBtn) textBtn.addEventListener('click', doToggle);
    }

    function selectSize(el, size) {
      selectedSize = size;
      document.querySelectorAll('.size-btn').forEach(btn => btn.classList.remove('border-yellow-400', 'bg-zinc-900'));
      el.classList.add('border-yellow-400', 'bg-zinc-900');
    }

    function handleAddToCart() {
      if (!currentProduct) return;
      const success = addToCart(currentProduct.id, selectedSize);
      if (success) {
        // Find the add to cart button and give feedback
        const addBtn = Array.from(document.querySelectorAll('button')).find(b => b.textContent.includes('ADD TO CART') || b.textContent.includes('ADDED'));
        if (addBtn) {
          const original = addBtn.textContent;
          addBtn.textContent = 'ADDED ✓';
          setTimeout(() => { addBtn.textContent = original; }, 1400);
        }
      }
    }

    window.onload = async () => {
      initCommonUI();
      await loadProduct();
    };
  </script>
</body>
</html>

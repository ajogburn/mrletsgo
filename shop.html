<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop | Mr. LetsGo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="product.js"></script>
  <script src="main.js"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .product-card { transition: all 0.3s ease; }
    .product-card:hover { transform: translateY(-8px); }
    .product-img {
      transition: all 0.4s ease;
    }
  </style>
</head>
<body class="bg-black text-white">

  <div id="header-placeholder"></div>

  <div class="bg-zinc-900 py-12 border-b border-zinc-800">
    <div class="max-w-7xl mx-auto px-6">
      <h1 class="text-5xl font-black tracking-tighter">SHOP ALL</h1>
      <p class="text-gray-400 mt-2">20 Premium Hype Sneakers • High Quality Batch</p>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-6 py-10">
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="product-grid"></div>
  </div>

  <div id="footer-placeholder"></div>

  <script>
    initCommonUI();

    function renderProducts() {
      const grid = document.getElementById('product-grid');
      if (!grid) return;
      const items = getProducts();
      grid.innerHTML = items.map(p => `
        <a href="product.html?id=${p.id}" class="product-card bg-zinc-900 rounded-3xl overflow-hidden group">
          <img src="${p.img}" 
               onerror="this.src='https://via.placeholder.com/600x400/27272a/white?text=Image+Loading...'" 
               class="product-img w-full h-64 object-cover group-hover:scale-105 transition">
          <div class="p-5">
            <h3 class="font-semibold text-sm leading-tight">${p.name}</h3>
            <p class="text-yellow-400 font-medium mt-2">$${p.price}</p>
          </div>
        </a>
      `).join('');
    }

    window.onload = renderProducts;
  </script>
</body>
</html>

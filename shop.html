<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop | Mr. LetsGo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .product-card { transition: all 0.4s ease; }
    .product-card:hover { transform: translateY(-12px); }
  </style>
</head>
<body class="bg-black text-white">

  <div id="header-placeholder"></div>

  <div class="bg-zinc-900 py-12 border-b border-zinc-800">
    <div class="max-w-7xl mx-auto px-6">
      <h1 class="text-5xl font-black tracking-tighter">SHOP ALL</h1>
      <p class="text-gray-400 mt-2">High Quality Batch Sneakers</p>
    </div>
  </div>

  <!-- Filters -->
  <div class="max-w-7xl mx-auto px-6 pt-8">
    <div class="flex flex-wrap items-center gap-2 mb-4">
      <!-- View tabs -->
      <div class="inline-flex rounded-2xl overflow-hidden border border-zinc-700 text-sm">
        <button data-filter="all" class="filter-tab px-4 py-2 bg-zinc-800 text-white">All</button>
        <button data-filter="new" class="filter-tab px-4 py-2 hover:bg-zinc-800">New Drops</button>
        <button data-filter="featured" class="filter-tab px-4 py-2 hover:bg-zinc-800">Featured</button>
      </div>

      <!-- Brand filter -->
      <select id="brand-filter" class="bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-2 text-sm">
        <option value="">All Brands</option>
      </select>

      <div class="flex-1"></div>
      <div id="results-count" class="text-sm text-gray-400"></div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-6 py-6">
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="product-grid">
      <!-- Products loaded from Supabase -->
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="supabase.js"></script>
  <script src="main.js"></script>
  <script>
    let allProducts = [];
    let currentFilter = 'all';
    let currentBrand = '';
    let currentSearch = '';
    let userFavIds = new Set();

    async function loadProducts() {
      const grid = document.getElementById('product-grid');
      grid.innerHTML = '<p class="col-span-full text-center text-gray-400">Loading products...</p>';

      try {
        allProducts = await loadProductsFromSupabase() || [];

        // populate brand dropdown
        populateBrandFilter();

        // read URL params for initial state
        const params = new URLSearchParams(location.search);
        if (params.get('new') === 'true') currentFilter = 'new';
        if (params.get('search')) {
          currentSearch = params.get('search');
          // optional: could show a search term pill
        }

        // preload current user's favorites (for heart states)
        await preloadUserFavorites();

        applyFiltersAndRender();
        wireFilterControls();
      } catch (err) {
        console.error(err);
        grid.innerHTML = '<p class="col-span-full text-center text-red-400">Error loading products. Check console.</p>';
      }
    }

    function populateBrandFilter() {
      const select = document.getElementById('brand-filter');
      if (!select) return;
      const brands = window.getAllBrands ? window.getAllBrands(allProducts) : [];
      brands.forEach(b => {
        const opt = document.createElement('option');
        opt.value = b;
        opt.textContent = b;
        select.appendChild(opt);
      });
      select.addEventListener('change', () => {
        currentBrand = select.value;
        applyFiltersAndRender();
      });
    }

    async function preloadUserFavorites() {
      userFavIds.clear();
      try {
        const favs = await window.MrLetsGo.getUserFavorites();
        favs.forEach(p => userFavIds.add(p.id));
      } catch (_) {}
    }

    function wireFilterControls() {
      document.querySelectorAll('.filter-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('bg-zinc-800', 'text-white'));
          btn.classList.add('bg-zinc-800', 'text-white');

          const f = btn.dataset.filter;
          currentFilter = f || 'all';
          applyFiltersAndRender();
        });
      });

      // set initial active tab
      const initialTab = document.querySelector(`.filter-tab[data-filter="${currentFilter}"]`) || document.querySelector('.filter-tab[data-filter="all"]');
      if (initialTab) {
        document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('bg-zinc-800', 'text-white'));
        initialTab.classList.add('bg-zinc-800', 'text-white');
      }
    }

    function applyFiltersAndRender() {
      const grid = document.getElementById('product-grid');
      let filtered = [...allProducts];

      // text search (from URL or future input)
      if (currentSearch) {
        const q = currentSearch.toLowerCase();
        filtered = filtered.filter(p =>
          (p.name && p.name.toLowerCase().includes(q)) ||
          (p.brand && p.brand.toLowerCase().includes(q))
        );
      }

      // type filter
      if (currentFilter === 'new') {
        filtered = filtered.filter(p => p.is_new_drop);
      } else if (currentFilter === 'featured') {
        filtered = filtered.filter(p => p.is_featured);
      }

      // brand filter
      if (currentBrand) {
        filtered = filtered.filter(p => p.brand === currentBrand);
      }

      const countEl = document.getElementById('results-count');
      if (countEl) countEl.textContent = `${filtered.length} product${filtered.length === 1 ? '' : 's'}`;

      if (!filtered.length) {
        grid.innerHTML = '<p class="col-span-full text-center text-gray-400 py-10">No products match your filters.</p>';
        return;
      }

      grid.innerHTML = filtered.map(p => renderShopCard(p)).join('');

      // After render, attach heart click handlers (they are not <a> children)
      attachHeartHandlers();
    }

    function renderShopCard(p) {
      const img = (window.getProductImages ? window.getProductImages(p)[0] : p.img) || p.img;
      const isFav = userFavIds.has(p.id);
      const brand = p.brand ? `<span class="text-xs text-gray-400">${p.brand}</span>` : '';

      return `
        <div class="product-card bg-zinc-900 rounded-3xl overflow-hidden group relative">
          <a href="product.html?id=${p.id}" class="block">
            <img src="${img}" class="w-full h-64 object-cover group-hover:scale-105 transition"
                 onerror="this.src='https://via.placeholder.com/600x400/27272a/fff?text=No+Image'">
          </a>

          <!-- Favorite heart -->
          <button data-fav-id="${p.id}" class="fav-btn absolute top-3 right-3 w-9 h-9 flex items-center justify-center rounded-full bg-black/60 hover:bg-black/80 transition">
            <i class="fa-solid fa-heart ${isFav ? 'text-red-500' : 'text-white/70'}"></i>
          </button>

          <a href="product.html?id=${p.id}" class="block p-5">
            <div class="flex items-start justify-between gap-2">
              <div>
                <h3 class="font-semibold leading-tight">${p.name}</h3>
                ${brand}
              </div>
              <div class="text-yellow-400 font-medium whitespace-nowrap">$${p.price}</div>
            </div>

            <div class="mt-3 text-xs text-emerald-400">
              ${p.is_new_drop ? 'NEW DROP' : ''} ${p.is_featured ? (p.is_new_drop ? ' • ' : '') + 'FEATURED' : ''}
            </div>
          </a>

          <div class="px-5 pb-5">
            <button onclick="quickAddToCart(${p.id}, this)"
                    class="w-full py-2.5 text-sm rounded-2xl border border-yellow-400 text-yellow-400 hover:bg-yellow-400 hover:text-black font-semibold transition">
              ADD TO CART
            </button>
          </div>
        </div>
      `;
    }

    function attachHeartHandlers() {
      document.querySelectorAll('.fav-btn').forEach(btn => {
        if (btn.dataset.wired) return;
        btn.dataset.wired = 'true';
        btn.addEventListener('click', async (e) => {
          e.preventDefault();
          e.stopImmediatePropagation();
          const id = parseInt(btn.dataset.favId, 10);
          const icon = btn.querySelector('i');

          const nowFav = await window.toggleFavorite(id);
          if (nowFav) {
            userFavIds.add(id);
            icon.classList.add('text-red-500');
            icon.classList.remove('text-white/70');
          } else {
            userFavIds.delete(id);
            icon.classList.remove('text-red-500');
            icon.classList.add('text-white/70');
          }
        });
      });
    }

    async function quickAddToCart(id, btn) {
      const ok = window.addToCart ? window.addToCart(id) : false;
      if (ok && btn) {
        const orig = btn.textContent;
        btn.textContent = 'ADDED ✓';
        setTimeout(() => btn.textContent = orig, 1400);
      }
    }

    window.onload = async () => {
      initCommonUI();
      await loadProducts();
    };
  </script>
</body>
</html>

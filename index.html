<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mr. LetsGo | Hype Sneakers</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="product.js"></script>
  <script src="main.js"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .hero-bg {
      background-image: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1549298916-b41d501d3772?q=80&w=2070');
      background-size: cover;
      background-position: center;
    }
  </style>
</head>
<body class="bg-black text-white">

  <div id="header-placeholder"></div>

  <!-- HERO -->
  <section class="hero-bg h-screen flex items-center">
    <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">
      <div>
        <h2 class="text-6xl md:text-7xl font-black leading-none mb-4">STEP UP<br>YOUR GAME</h2>
        <p class="text-xl text-gray-300 mb-8 max-w-md">Fresh drops. Bold styles. Built for those who move different.</p>
        <a href="shop.html" class="bg-yellow-400 text-black px-10 py-4 font-semibold text-lg inline-block hover:bg-white transition">SHOP NOW</a>
      </div>
    </div>
  </section>

  <!-- FEATURED SNEAKERS -->
  <section class="py-20 bg-zinc-950">
    <div class="max-w-7xl mx-auto px-6">
      <h2 class="text-4xl font-bold text-center mb-12">Featured Sneakers</h2>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-6" id="featured-grid"></div>
    </div>
  </section>

  <div id="footer-placeholder"></div>

  <script>
    initCommonUI();

    function renderFeatured() {
      const grid = document.getElementById('featured-grid');
      if (!grid) return;
      const items = getProducts().slice(0, 4);
      grid.innerHTML = items.map(p => `
        <a href="product.html?id=${p.id}" class="product-card bg-zinc-900 rounded-3xl overflow-hidden group">
          <img src="${p.img}" 
               onerror="this.src='https://via.placeholder.com/600x400/27272a/white?text=Image+Loading...'" 
               class="w-full h-64 object-cover group-hover:scale-105 transition">
          <div class="p-5">
            <h3 class="font-semibold">${p.name}</h3>
            <p class="text-yellow-400">$${p.price}</p>
          </div>
        </a>
      `).join('');
    }

    window.onload = renderFeatured;
  </script>
  <script src="supabase.js"></script>
<script src="main.js"></script>
</body>
</html>

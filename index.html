<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mr. LetsGo | Hype Sneakers</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .hero-bg {
      background-image: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1549298916-b41d501d3772?q=80&w=2070');
      background-size: cover;
      background-position: center;
    }
  </style>
</head>
<body class="bg-black text-white">

  <!-- HEADER -->
  <header class="bg-black border-b border-zinc-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-8 flex items-center justify-between">
      <h1 class="text-3xl font-black tracking-tighter text-yellow-400">MR. LETSGO</h1>
      
      <nav class="hidden md:flex space-x-8 text-sm font-medium">
        <a href="#" class="hover:text-yellow-400 transition">SHOP</a>
        <a href="#" class="hover:text-yellow-400 transition">NEW DROPS</a>
        <a href="#" class="hover:text-yellow-400 transition">BRANDS</a>
        <a href="#" class="hover:text-yellow-400 transition">ABOUT</a>
        <a href="#" class="hover:text-yellow-400 transition">CONTACT</a>
      </nav>

      <div class="flex items-center gap-5">
        <i class="fa-solid fa-magnifying-glass text-xl cursor-pointer hover:text-yellow-400"></i>
        <i class="fa-solid fa-user text-xl cursor-pointer hover:text-yellow-400"></i>
        <i class="fa-solid fa-bag-shopping text-xl cursor-pointer hover:text-yellow-400"></i>
      </div>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero-bg h-screen flex items-center">
    <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">
      <div>
        <h2 class="text-6xl md:text-7xl font-black leading-none mb-4">
          STEP UP<br>YOUR GAME
        </h2>
        <p class="text-xl text-gray-300 mb-8 max-w-md">
          Fresh drops. Bold styles. Built for those who move different.
        </p>
        <a href="#" class="bg-yellow-400 text-black px-10 py-4 font-semibold text-lg inline-block hover:bg-white transition">
          SHOP NOW
        </a>
      </div>
    </div>
  </section>

  <!-- FEATURED SNEAKERS -->
  <section class="py-20 bg-zinc-950">
    <div class="max-w-7xl mx-auto px-6">
      <h2 class="text-4xl font-bold text-center mb-12">Featured Sneakers</h2>
      
      <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
        <!-- Add more cards like this -->
        <div class="group bg-zinc-900 rounded-2xl overflow-hidden hover:scale-105 transition">
          <img src="https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa" class="w-full h-64 object-cover">
          <div class="p-5">
            <h3 class="font-semibold">Nike Air Force 1</h3>
            <p class="text-yellow-400">$129</p>
          </div>
        </div>
        
        <!-- Repeat for more products -->
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="bg-black border-t border-zinc-800 py-12">
    <div class="max-w-7xl mx-auto px-6 text-center">
      <p class="text-gray-500">© 2026 Mr. LetsGo. All Rights Reserved.</p>
    </div>
  </footer>

</body>
</html>

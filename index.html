<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mr. LetsGo | Hype Sneakers</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .hero-bg {
      background-image: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), 
                        url('https://images.unsplash.com/photo-1549298916-b41d501d3772?q=80&w=2070');
      background-size: cover;
      background-position: center;
    }
  </style>
</head>
<body class="bg-black text-white">

  <div id="header-placeholder"></div>

  <!-- HERO - Restored with big shoe background -->
  <section class="hero-bg h-screen flex items-center">
    <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">
      <div>
        <h2 class="text-6xl md:text-7xl font-black leading-none mb-4">STEP UP<br>YOUR GAME</h2>
        <p class="text-xl text-gray-300 mb-8 max-w-md">Fresh drops. Bold styles. Built for those who move different.</p>
        <a href="shop.html" class="bg-yellow-400 text-black px-10 py-4 font-semibold text-lg inline-block hover:bg-white transition">SHOP NOW</a>
      </div>
    </div>
  </section>

  <!-- NEW DROPS -->
  <section class="py-16 bg-zinc-950">
    <div class="max-w-7xl mx-auto px-6">
      <div class="flex justify-between items-end mb-8">
        <h2 class="text-4xl font-bold">New Drops</h2>
        <a href="shop.html" class="text-yellow-400 hover:underline">See all new drops →</a>
      </div>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-6" id="new-drops-grid"></div>
    </div>
  </section>

  <!-- FEATURED SNEAKERS -->
  <section class="py-16 bg-black">
    <div class="max-w-7xl mx-auto px-6">
      <div class="flex justify-between items-end mb-8">
        <h2 class="text-4xl font-bold">Featured Sneakers</h2>
        <a href="shop.html" class="text-yellow-400 hover:underline">Browse all →</a>
      </div>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-6" id="featured-grid"></div>
    </div>
  </section>

  <div id="footer-placeholder"></div>

  <script src="supabase.js"></script>
  <script src="main.js"></script>
  <script>
    async function loadHomepageSections() {
      try {
        const { data: products, error } = await window.supabaseClient
          .from('products')
          .select('*')
          .order('id');

        if (error) throw error;

        // New Drops
        const newDrops = products.filter(p => p.is_new_drop === true).slice(0, 4);
        renderSection('new-drops-grid', newDrops);

        // Featured
        const featured = products.filter(p => p.is_featured === true).slice(0, 4);
        renderSection('featured-grid', featured.length ? featured : products.slice(0, 4));

      } catch (err) {
        console.error("Failed to load homepage sections:", err);
      }
    }

    function renderSection(containerId, items) {
      const container = document.getElementById(containerId);
      if (!container) return;

      if (!items || items.length === 0) {
        container.innerHTML = `<p class="col-span-full text-gray-400 text-center py-12">No items available yet</p>`;
        return;
      }

      container.innerHTML = items.map(p => `
        <a href="product.html?id=${p.id}" class="product-card bg-zinc-900 rounded-3xl overflow-hidden group">
          <img src="${p.img}" class="w-full h-64 object-cover group-hover:scale-105 transition">
          <div class="p-5">
            <h3 class="font-semibold text-sm leading-tight">${p.name}</h3>
            <p class="text-yellow-400 font-medium mt-1">$${p.price}</p>
          </div>
        </a>
      `).join('');
    }

    window.onload = () => {
      initCommonUI();
      loadHomepageSections();
    };
  </script>
</body>
</html>

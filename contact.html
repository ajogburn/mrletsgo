<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Mr. LetsGo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="supabase.js"></script>
  <script src="main.js"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-black text-white">

  <div id="header-placeholder"></div>

  <div class="max-w-7xl mx-auto px-6 py-20">
    <div class="text-center mb-16">
      <h1 class="text-6xl font-black tracking-tighter">GET IN TOUCH</h1>
      <p class="text-xl text-gray-400 mt-4">We'd love to hear from you</p>
    </div>

    <div class="grid md:grid-cols-2 gap-16">
      <!-- Contact Form -->
      <div>
        <h2 class="text-2xl font-bold mb-8">Send Us a Message</h2>
        
        <form id="contact-form" action="https://formsubmit.co/goldenchildh20@gmail.com" method="POST" class="space-y-6">
          <!-- Honeypot for spam bots (keep this hidden) -->
          <input type="text" name="_honey" style="display:none">

          <div class="grid grid-cols-2 gap-4">
            <input type="text" name="first_name" placeholder="First Name" required
                   class="bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-yellow-400">
            <input type="text" name="last_name" placeholder="Last Name" required
                   class="bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-yellow-400">
          </div>
          
          <!-- IMPORTANT: name="email" helps FormSubmit set the correct reply-to address -->
          <input type="email" name="email" placeholder="Email Address" required
                 class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-yellow-400">
          
          <input type="text" name="subject" placeholder="Subject" required
                 class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-yellow-400">
          
          <textarea name="message" placeholder="Your Message" rows="6" required
                    class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-yellow-400"></textarea>
          
          <!-- FormSubmit configuration -->
          <input type="hidden" name="_subject" value="New Message from Mr. LetsGo Website">
          <input type="hidden" name="_replyto" value="email"> <!-- use the email field above -->
          <input type="hidden" name="_next" value="thank-you.html">
          <!-- Note: _captcha=false can sometimes block delivery on first-time setups. Remove this line if emails still don't arrive. -->
          <input type="hidden" name="_captcha" value="false">
          <input type="hidden" name="_template" value="table">

          <button type="submit"
                  class="w-full bg-yellow-400 text-black py-5 font-bold text-lg rounded-2xl hover:bg-white transition">
            SEND MESSAGE
          </button>
        </form>
      </div>

     
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script>
    initCommonUI();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Mr. LetsGo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="supabase.js"></script>
  <script src="main.js"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-black text-white">

  <div id="header-placeholder"></div>

  <div class="max-w-7xl mx-auto px-6 py-20">
    <div class="text-center mb-16">
      <h1 class="text-6xl font-black tracking-tighter">GET IN TOUCH</h1>
      <p class="text-xl text-gray-400 mt-4">We'd love to hear from you</p>
    </div>

    <div class="grid md:grid-cols-2 gap-16">
      <!-- Contact Form -->
      <div>
        <h2 class="text-2xl font-bold mb-8">Send Us a Message</h2>
        
        <form id="contact-form" action="https://formsubmit.co/ajogburn96@gmail.com" method="POST" class="space-y-6">
          <div class="grid grid-cols-2 gap-4">
            <input type="text" name="First Name" placeholder="First Name" required
                   class="bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-yellow-400">
            <input type="text" name="Last Name" placeholder="Last Name" required
                   class="bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-yellow-400">
          </div>
          
          <input type="email" name="Email" placeholder="Email Address" required
                 class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-yellow-400">
          
          <input type="text" name="Subject" placeholder="Subject" required
                 class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-yellow-400">
          
          <textarea name="Message" placeholder="Your Message" rows="6" required
                    class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-yellow-400"></textarea>
          
          <!-- Hidden fields for better control -->
          <input type="hidden" name="_subject" value="New Message from Mr. LetsGo Website!">
          <input type="hidden" name="_next" value="https://mrletsgo.com/thank-you.html"> <!-- Optional thank you page -->
          <input type="hidden" name="_captcha" value="false">
          <input type="hidden" name="_template" value="table">

          <button type="submit"
                  class="w-full bg-yellow-400 text-black py-5 font-bold text-lg rounded-2xl hover:bg-white transition">
            SEND MESSAGE
          </button>
        </form>
      </div>

    
        </div>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script>
    initCommonUI();

    // Optional: Nice success message
    document.getElementById('contact-form').addEventListener('submit', function() {
      setTimeout(() => {
        alert("✅ Message sent successfully! We'll get back to you soon.");
      }, 500);
    });
  </script>
</body>
</html>
